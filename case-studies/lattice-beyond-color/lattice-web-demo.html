<!doctype html>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Lattice Beyond Color — Interactive Concept Demo</title>
<style>
:root{--bg:#071014;--panel:#101b20;--ink:#eef4ed;--muted:#a7b6b0;--line:#31434b;--accent:#71c7b6}
*{box-sizing:border-box} body{margin:0;background:radial-gradient(circle at 20% 0,#172b30,var(--bg) 48%);color:var(--ink);font:16px/1.45 system-ui,Segoe UI,sans-serif}
main{max-width:1180px;margin:auto;padding:32px} h1{letter-spacing:.08em;font-size:clamp(28px,5vw,54px);margin:.1em 0} .sub{color:var(--muted);max-width:760px}
.controls{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin:28px 0} label{display:grid;gap:8px;color:var(--muted);font-size:14px} select,input{width:100%} select{background:var(--panel);color:var(--ink);border:1px solid var(--line);border-radius:12px;padding:10px}
.stage{display:grid;grid-template-columns:1.4fr .8fr;gap:24px;align-items:stretch} .viz,.info{border:1px solid var(--line);border-radius:22px;background:rgba(16,27,32,.78)} .viz{min-height:560px;position:relative;overflow:hidden} svg{width:100%;height:100%;display:block} .info{padding:24px} .formula{font-family:ui-monospace,monospace;color:var(--accent);padding:12px 0;border-bottom:1px solid var(--line)} .metric{display:grid;grid-template-columns:120px 1fr 38px;gap:10px;align-items:center;margin:14px 0} .track{height:8px;background:#223239;border-radius:8px;overflow:hidden} .bar{height:100%;background:var(--accent)} .trace{margin-top:20px;padding:14px;border-left:3px solid var(--accent);background:color-mix(in srgb,var(--accent) 9%,transparent)}
@media(max-width:800px){.controls{grid-template-columns:1fr 1fr}.stage{grid-template-columns:1fr}.viz{min-height:430px}}
</style>
<main>
<h1>LATTICE BEYOND COLOR</h1><p class="sub">A deterministic visualization of five biomimetic product systems. Adjust state; the same normalized inputs produce concept-specific geometry and behavior.</p>
<section class="controls">
<label>Concept<select id="concept"></select></label>
<label>Load <input id="load" type="range" min="0" max="100" value="55"></label>
<label>Uncertainty <input id="uncertainty" type="range" min="0" max="100" value="30"></label>
<label>Risk <input id="risk" type="range" min="0" max="100" value="45"></label>
</section>
<section class="stage"><div class="viz"><svg id="svg" viewBox="0 0 720 560" role="img" aria-label="Generated lattice visualization"></svg></div><aside class="info"><h2 id="name"></h2><p id="subtitle" class="sub"></p><div id="formulas"></div><h3>Decision profile</h3><div id="metrics"></div><div class="trace"><strong>Trace</strong><div id="trace"></div></div><p id="selling"></p></aside></section>
</main>
<script>
const concepts=[{"id":"helioveil","name":"HELIOVEIL","subtitle":"Adaptive climate skin + building-energy interface","formula":["λ_peak = 2 n_eff d cos(θ)","P_rad = εσA(T_s⁴ − T_sky⁴)","a_open = sigmoid(k_TΔT + k_S S + k_O O − b)"],"selling":"Turns climate control from an invisible mechanical system into a legible, controllable material intelligence layer.","scores":{"determinism":80,"innovation":76,"relevance":90,"divergence":58}},{"id":"echovault","name":"ECHOVAULT","subtitle":"Phononic privacy, clarity, and spatial-audio control","formula":["f_gap ≈ c / (2a)","T(f,L) = exp(−α(f)L)","x(f) = x_min + (x_max−x_min)·norm(log f)"],"selling":"Makes invisible acoustic control tangible enough for architects, studios, workplaces, and privacy-sensitive rooms to trust.","scores":{"determinism":70,"innovation":82,"relevance":80,"divergence":72}},{"id":"faultgarden","name":"FAULT GARDEN","subtitle":"Evidence graph where defects reveal uncertainty and discovery","formula":["P(h|e) = P(e|h)P(h) / P(e)","defect_salience = impact × evidence_gap × novelty","confidence_out = 1 − ∏(1 − w_i·c_i)"],"selling":"Differentiates by showing not just what the system knows, but where its knowledge is strained, missing, imported, or internally inconsistent.","scores":{"determinism":40,"innovation":88,"relevance":92,"divergence":84}},{"id":"capillarycommons","name":"CAPILLARY COMMONS","subtitle":"Resilient routing for water, energy, logistics, and mutual aid","formula":["Q = ΔP / R","D_eff = D·ε/τ","J = −D_eff∇C","resilience = served_after_failure / served_before_failure"],"selling":"Lets planners prove the value of redundancy and equity before infrastructure fails, using a system people can interrogate rather than a black-box forecast.","scores":{"determinism":75,"innovation":74,"relevance":95,"divergence":64}},{"id":"nacresentinel","name":"NACRE SENTINEL","subtitle":"Layered cyber resilience that deflects and absorbs attacks","formula":["risk_{t+1} = clip(A·risk_t − heal_t, 0, 1)","E_absorb ∝ Σ(path_length × interface_friction)","containment = 1 − compromised_critical / total_critical"],"selling":"Explains resilience as architecture and controlled failure—not as an endless stream of alarms—making security posture defensible to technical and executive audiences.","scores":{"determinism":90,"innovation":70,"relevance":96,"divergence":52}}];
const colors={helioveil:'#71c7b6',echovault:'#8da6d9',faultgarden:'#b59cc8',capillarycommons:'#b6c98f',nacresentinel:'#d1b08a'};
const sel=document.querySelector('#concept'); concepts.forEach(c=>sel.add(new Option(c.name,c.id)));
const svg=document.querySelector('#svg'); const clamp=v=>Math.max(0,Math.min(1,v));
function state(){return{load:+load.value/100,unc:+uncertainty.value/100,risk:+risk.value/100}}
function el(tag,a={}){const n=document.createElementNS('http://www.w3.org/2000/svg',tag);Object.entries(a).forEach(([k,v])=>n.setAttribute(k,v));return n}
function draw(){const c=concepts.find(x=>x.id===sel.value),s=state(),col=colors[c.id];document.documentElement.style.setProperty('--accent',col);svg.innerHTML='';svg.append(el('rect',{width:720,height:560,fill:'#0b1519'}));
if(c.id==='helioveil'){const r=18+20*s.load;for(let y=60,row=0;y<520;y+=56,row++)for(let x=55+(row%2)*33;x<690;x+=66){const pts=[0,1,2,3,4,5].map(k=>{const a=Math.PI/3*k;return`${x+r*Math.cos(a)},${y+r*Math.sin(a)}`}).join(' ');svg.append(el('polygon',{points:pts,fill:col,'fill-opacity':.08+.35*s.load,stroke:col,'stroke-opacity':.42+.4*(1-s.unc),'stroke-width':1.5}))}}
else if(c.id==='echovault'){for(let i=0;i<18;i++){let d='';for(let x=0;x<=720;x+=8){const y=50+i*27+Math.sin(x/(18+45*s.load)+i)*((4+i*.35)*(1+s.risk));d+=(x?'L':'M')+x+' '+y}svg.append(el('path',{d,fill:'none',stroke:col,'stroke-opacity':.18+i*.025,'stroke-width':1+i*.08}))}}
else if(c.id==='faultgarden'){for(let y=60,row=0;y<520;y+=58,row++)for(let x=60,colI=0;x<690;x+=58,colI++){const defect=((row*7+colI*11)%17)/17<s.unc*.6;if(defect)continue;const skew=(row===3&&colI>4)?20*s.risk:0;svg.append(el('rect',{x:x+skew,y,width:34,height:34,rx:5,fill:col,'fill-opacity':.10+.26*(1-s.unc),stroke:col,'stroke-opacity':.42}))}}
else if(c.id==='capillarycommons'){const n=34,pts=[];for(let i=0;i<n;i++)pts.push([50+(i*83)%620,55+(i*137)%450]);for(let i=0;i<n;i++){const near=pts.map((p,j)=>[j,(p[0]-pts[i][0])**2+(p[1]-pts[i][1])**2]).filter(x=>x[0]!==i).sort((a,b)=>a[1]-b[1]).slice(0,2+(s.risk>.5?1:0));near.forEach(([j])=>svg.append(el('line',{x1:pts[i][0],y1:pts[i][1],x2:pts[j][0],y2:pts[j][1],stroke:col,'stroke-opacity':.28+.42*s.load,'stroke-width':1+5*s.load})));svg.append(el('circle',{cx:pts[i][0],cy:pts[i][1],r:3+5*s.unc,fill:col}))}}
else{for(let y=55,row=0;y<510;y+=42,row++)for(let x=35+(row%2)*34;x<690;x+=76)svg.append(el('rect',{x,y,width:64,height:25,rx:5,fill:col,'fill-opacity':.10+.28*(1-s.risk),stroke:col,'stroke-opacity':.4}));let d='M 40 70';for(let i=1;i<9;i++)d+=` L ${40+i*78} ${70+i*50+(i%2?55*s.risk:-25*s.risk)}`;svg.append(el('path',{d,fill:'none',stroke:'#f1eee7','stroke-width':5,'stroke-dasharray':'9 8','stroke-opacity':.82}))}
name.textContent=c.name;subtitle.textContent=c.subtitle;formulas.innerHTML=c.formula.map(f=>`<div class="formula">${f}</div>`).join('');metrics.innerHTML=Object.entries(c.scores).map(([k,v])=>`<div class="metric"><span>${k}</span><div class="track"><div class="bar" style="width:${v}%"></div></div><b>${v}</b></div>`).join('');trace.textContent=`load=${s.load.toFixed(2)} → uncertainty=${s.unc.toFixed(2)} → risk=${s.risk.toFixed(2)} → ${c.id} geometry`;selling.textContent=c.selling;}
[sel,load,uncertainty,risk].forEach(x=>x.addEventListener('input',draw));draw();
</script>
