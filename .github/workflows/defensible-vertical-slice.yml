name: Defensible Vertical Slice
on:
  pull_request:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  verify:
    uses: MelodicBloom/.github/.github/workflows/reusable-defensible-vertical-slice.yml@597d76aa36c833f8374b1756e4db46244e012323
    with:
      node-version: "20"
      package-manager: npm
      profile-path: .melodicbloom/verification-profile.json
      typecheck-command: npx tsc --noEmit
      test-command: npm run test:visual
      build-command: npm run build
      specialized-command: test -d schemas && find schemas -type f -name '*.json' -print0 | xargs -0 -n1 node -e "JSON.parse(require('fs').readFileSync(process.argv[1],'utf8'))"
      artifact-path: dist
