name: Analyzer Core

on:
  push:
    paths:
      - 'packages/analyzer-core/**'
      - 'packages/schemas/**'
      - '.github/workflows/analyzer-core.yml'
  pull_request:
    paths:
      - 'packages/analyzer-core/**'
      - 'packages/schemas/**'
      - '.github/workflows/analyzer-core.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/analyzer-core
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install analyzer dependencies
        run: npm install --no-audit --no-fund

      - name: Typecheck analyzer core
        run: npm run typecheck

      - name: Test without network providers
        run: npm test

      - name: Build analyzer core
        run: npm run build
