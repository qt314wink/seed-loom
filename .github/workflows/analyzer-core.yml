name: Analyzer Core

on:
  push:
    paths:
      - 'packages/analyzer-core/**'
      - 'packages/schemas/**'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/analyzer-core.yml'
  pull_request:
    paths:
      - 'packages/analyzer-core/**'
      - 'packages/schemas/**'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/analyzer-core.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.15.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install workspace dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Typecheck analyzer core
        run: pnpm --filter @seed-loom/analyzer-core typecheck

      - name: Test without network providers
        run: pnpm --filter @seed-loom/analyzer-core test

      - name: Build analyzer core
        run: pnpm --filter @seed-loom/analyzer-core build
