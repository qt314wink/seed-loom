name: Signal Validation

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  validate-scaffold:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate Seed Loom scaffold
        run: python scripts/check_pipeline.py
