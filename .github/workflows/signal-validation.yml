name: Signal Validation

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  validate-scaffold:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate Seed Loom scaffold
        run: python scripts/check_pipeline.py

  validate-textile-interface:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install schema validator
        run: python -m pip install --disable-pip-version-check jsonschema==4.23.0

      - name: Verify generated adapters are synchronized
        run: python scripts/generate_textile_adapters.py --check

      - name: Validate manifests and Core references
        run: python scripts/validate_textile_interface.py
