name: Provenance Collection

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Collect repo provenance
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/collect_repo_provenance.py

      - name: Commit evidence
        run: |
          git config user.name  "provenance[bot]"
          git config user.email "provenance@users.noreply.github.com"
          git add portfolio/evidence/
          git diff --staged --quiet || git commit -m "evidence: nightly provenance collection $(date -u +%Y-%m-%d)"
          git push
