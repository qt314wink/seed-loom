<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Textile Interface — Core SwatchCard</title>
  <style>
    :root {
      color-scheme: light;
      --til-linen: #f5f0e8;
      --til-surface: #faf7f2;
      --til-ink: #2c2c2c;
      --til-indigo: #2c3e7e;
      --til-saffron: #ff9f1c;
      --til-emerald: #0a8c6b;
      --til-rose: #e85d75;
      --til-muted: #6b6b6b;
      --til-focus: #0b62ce;
      --til-radius: 1rem;
      --til-stitch-width: 2px;
      --til-recovery: 220ms cubic-bezier(.2,.8,.2,1);
      --til-pleat-shadow:
        0 18px 35px rgb(44 44 44 / 10%),
        0 4px 10px rgb(44 44 44 / 8%),
        inset 0 1px 0 rgb(255 255 255 / 75%);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem;
      color: var(--til-ink);
      background:
        repeating-linear-gradient(0deg, transparent 0 5px, rgb(44 62 126 / 2%) 5px 6px),
        repeating-linear-gradient(90deg, transparent 0 7px, rgb(44 62 126 / 1.5%) 7px 8px),
        var(--til-linen);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .demo {
      width: min(100%, 72rem);
      display: grid;
      gap: 1.5rem;
    }

    .demo > header {
      max-width: 48rem;
    }

    h1 {
      margin: 0 0 .5rem;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(2rem, 5vw, 4.5rem);
      line-height: .98;
      letter-spacing: -.035em;
    }

    .demo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(min(100%, 18rem), 1fr));
      gap: 1.25rem;
      align-items: start;
    }

    textile-swatch-card { display: block; }

    .swatch-card {
      position: relative;
      display: grid;
      gap: 1rem;
      min-height: 24rem;
      padding: 1rem;
      overflow: hidden;
      border: var(--til-stitch-width) dashed var(--til-indigo);
      border-radius: var(--til-radius);
      background:
        linear-gradient(135deg, rgb(255 255 255 / 68%), transparent 45%),
        var(--til-surface);
      box-shadow: var(--til-pleat-shadow);
      transition:
        transform var(--til-recovery),
        box-shadow var(--til-recovery),
        border-style var(--til-recovery);
    }

    .swatch-card::after {
      content: "";
      position: absolute;
      inset: auto 1rem .75rem;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--til-indigo), transparent);
      opacity: .35;
      transform: scaleX(.72);
      transform-origin: center;
      transition: transform var(--til-recovery), opacity var(--til-recovery);
      pointer-events: none;
    }

    .swatch-card:hover,
    .swatch-card:focus-within {
      transform: translateY(-4px);
      box-shadow:
        0 24px 45px rgb(44 44 44 / 14%),
        0 6px 14px rgb(44 44 44 / 9%),
        inset 0 1px 0 rgb(255 255 255 / 82%);
    }

    .swatch-card:hover::after,
    .swatch-card:focus-within::after {
      opacity: .62;
      transform: scaleX(1);
    }

    .swatch-card[data-selected="true"] {
      border-style: solid;
      box-shadow:
        0 0 0 3px rgb(44 62 126 / 12%),
        var(--til-pleat-shadow);
    }

    .swatch-card[data-disabled="true"] {
      opacity: .58;
      filter: grayscale(.35);
    }

    .swatch-card__media {
      min-height: 11rem;
      border-radius: calc(var(--til-radius) - .35rem);
      background:
        radial-gradient(circle at 75% 20%, var(--til-saffron) 0 9%, transparent 10%),
        radial-gradient(circle at 24% 70%, var(--til-rose) 0 12%, transparent 13%),
        linear-gradient(135deg, var(--til-indigo), var(--til-emerald));
      box-shadow: inset 0 0 0 1px rgb(255 255 255 / 30%);
    }

    .swatch-card__meta,
    .swatch-card__actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: .75rem;
    }

    .swatch-card__status,
    .swatch-card__tag {
      display: inline-flex;
      align-items: center;
      min-height: 1.75rem;
      padding: .25rem .6rem;
      border-radius: 999px;
      font-size: .75rem;
      font-weight: 700;
      letter-spacing: .04em;
    }

    .swatch-card__status {
      color: white;
      background: var(--til-indigo);
    }

    .swatch-card__tag {
      color: var(--til-indigo);
      border: 1px solid rgb(44 62 126 / 28%);
      background: rgb(44 62 126 / 6%);
    }

    .swatch-card__body { display: grid; gap: .5rem; }

    .swatch-card__title {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 1.5rem;
      line-height: 1.05;
    }

    .swatch-card__creator,
    .swatch-card__description {
      margin: 0;
      color: var(--til-muted);
    }

    .swatch-card__description { line-height: 1.55; }

    .swatch-card button {
      min-height: 2.75rem;
      padding: .65rem .9rem;
      border: 2px dashed var(--til-indigo);
      border-radius: .75rem;
      color: var(--til-indigo);
      background: transparent;
      font: inherit;
      font-weight: 750;
      cursor: pointer;
      transition: transform 100ms ease, background-color 100ms ease, color 100ms ease;
    }

    .swatch-card button:hover { background: rgb(44 62 126 / 7%); }
    .swatch-card button:active { transform: scale(.97); }
    .swatch-card button[aria-pressed="true"] {
      border-style: solid;
      color: white;
      background: var(--til-indigo);
    }

    .swatch-card button:focus-visible {
      outline: 3px solid var(--til-focus);
      outline-offset: 3px;
    }

    .swatch-card button:disabled {
      cursor: not-allowed;
      opacity: .65;
    }

    .swatch-card__state {
      font-size: .8rem;
      font-weight: 700;
      color: var(--til-emerald);
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        scroll-behavior: auto !important;
        transition-duration: .001ms !important;
        animation-duration: .001ms !important;
        animation-iteration-count: 1 !important;
      }

      .swatch-card:hover,
      .swatch-card:focus-within { transform: none; }
    }

    @media (forced-colors: active) {
      .swatch-card,
      .swatch-card button { border-style: solid; }
      .swatch-card__media { border: 1px solid CanvasText; }
    }
  </style>
</head>
<body>
  <main class="demo">
    <header>
      <p><strong>TIL-COMP-SWATCH-001</strong> · Core fidelity · CSS + native web platform</p>
      <h1>SwatchCard</h1>
      <p>The textile metaphor supports state and hierarchy, but the card remains legible, operable, and meaningful when texture and motion are removed.</p>
    </header>

    <section class="demo-grid" aria-label="SwatchCard state examples">
      <textile-swatch-card
        title="Open Loom"
        creator="@qt314wink"
        status="Reference"
        description="A linen editorial card with a pleat-derived selected state."
        tags="linen,pleat,core">
      </textile-swatch-card>

      <textile-swatch-card
        title="Quiet Repair"
        creator="Textile Interface"
        status="Saved"
        description="This instance begins selected to demonstrate persistent stitch state."
        tags="mend,felt,state"
        selected>
      </textile-swatch-card>

      <textile-swatch-card
        title="Unavailable Swatch"
        creator="System"
        status="Disabled"
        description="Disabled state remains readable while removing interactive controls."
        tags="fallback,disabled"
        disabled>
      </textile-swatch-card>
    </section>
  </main>

  <script>
    class TextileSwatchCard extends HTMLElement {
      connectedCallback() {
        const selected = this.hasAttribute('selected');
        const disabled = this.hasAttribute('disabled');
        const title = this.getAttribute('title') || 'Untitled swatch';
        const creator = this.getAttribute('creator') || 'Unknown creator';
        const status = this.getAttribute('status') || 'Draft';
        const description = this.getAttribute('description') || '';
        const tags = (this.getAttribute('tags') || '')
          .split(',')
          .map((tag) => tag.trim())
          .filter(Boolean);

        this.innerHTML = `
          <article class="swatch-card" data-selected="${selected}" data-disabled="${disabled}" aria-labelledby="${this.id || 'swatch'}-title">
            <div class="swatch-card__media" role="img" aria-label="Abstract textile swatch in indigo, emerald, saffron, and rose"></div>
            <div class="swatch-card__meta">
              <span class="swatch-card__status">${status}</span>
              <span class="swatch-card__state" aria-live="polite">${selected ? 'Stitched · saved' : 'Loose · not saved'}</span>
            </div>
            <div class="swatch-card__body">
              <h2 class="swatch-card__title" id="${this.id || 'swatch'}-title">${title}</h2>
              <p class="swatch-card__creator">${creator}</p>
              <p class="swatch-card__description">${description}</p>
              <div aria-label="Tags">${tags.map((tag) => `<span class="swatch-card__tag">${tag}</span>`).join(' ')}</div>
            </div>
            <div class="swatch-card__actions">
              <button type="button" class="swatch-card__save" aria-pressed="${selected}" ${disabled ? 'disabled' : ''}>
                ${selected ? 'Unpick save' : 'Stitch save'}
              </button>
              <button type="button" ${disabled ? 'disabled' : ''}>View DNA</button>
            </div>
          </article>`;

        const card = this.querySelector('.swatch-card');
        const saveButton = this.querySelector('.swatch-card__save');
        const state = this.querySelector('.swatch-card__state');

        saveButton?.addEventListener('click', () => {
          const nextSelected = saveButton.getAttribute('aria-pressed') !== 'true';
          saveButton.setAttribute('aria-pressed', String(nextSelected));
          saveButton.textContent = nextSelected ? 'Unpick save' : 'Stitch save';
          card.dataset.selected = String(nextSelected);
          state.textContent = nextSelected ? 'Stitched · saved' : 'Loose · not saved';
        });
      }
    }

    customElements.define('textile-swatch-card', TextileSwatchCard);
  </script>
</body>
</html>
